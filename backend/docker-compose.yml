# PocketBase para o LuPe — SQLite embutido, roda na sua VPS.
# As coleções (perfis, progresso) são criadas automaticamente pelas migrações
# em ./pb_migrations na primeira subida. Os dados ficam em ./pb_data (SQLite).

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.39.9
    container_name: lupe-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data # banco SQLite + arquivos (persistente)
      - ./pb_migrations:/pb_migrations # schema versionado (auto-aplicado)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
